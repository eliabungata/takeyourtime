<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>For Misoji</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght=0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Plus+Jakarta+Sans:wght=300;400;600;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --space-black: #030712;
    --cosmic-indigo:#0f172a;
    --royal-blue:   #3b82f6; 
    --nebula-purple:#8b5cf6;
    --starlight:    #f8fafc;
    --glass-sheen:  linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0) 100%);
  }

  html, body { width: 100%; height: 100%; overflow: hidden; position: fixed; }

  body {
    background: linear-gradient(-45deg, #030712, #0b1329, #1e1b4b, #030712);
    background-size: 400% 400%;
    animation: celestialShift 25s ease infinite;
    color: var(--starlight);
    font-family: 'Plus Jakarta Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    perspective: 1000px;
    -webkit-font-smoothing: antialiased;
  }

  @keyframes celestialShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── PARALLAX CANVASES ── */
  canvas { position: fixed; inset: 0; pointer-events: none; will-change: transform; }
  #nebulaCanvas { z-index: 1; filter: blur(20px); }
  #bgCanvas { z-index: 2; } 
  #interactiveCanvas { z-index: 12; } 

  /* ── LUXURY GLASS CARD ── */
  .card-container {
    perspective: 1000px;
    z-index: 5;
    transition: transform 0.1s ease-out;
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .card {
    position: relative;
    text-align: center;
    width: min(580px, 92vw);
    max-height: 92vh;
    overflow-y: auto;
    padding: clamp(2rem, 6vh, 4.5rem) clamp(1rem, 4vw, 3.5rem);
    background: rgba(15, 23, 42, 0.45); 
    border-radius: 24px;
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), 
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
    overflow: hidden;
  }
  .card::-webkit-scrollbar { width: 0px; background: transparent; }

  .card::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: var(--glass-sheen);
    transform: rotate(45deg);
    pointer-events: none;
    z-index: 5;
    animation: sheenPass 8s cubic-bezier(0.25, 1, 0.5, 1) infinite;
  }

  @keyframes sheenPass {
    0% { transform: translate(-30%, -30%) rotate(45deg); opacity: 0; }
    10% { opacity: 1; }
    30% { transform: translate(30%, 30%) rotate(45deg); opacity: 0; }
    100% { transform: translate(30%, 30%) rotate(45deg); opacity: 0; }
  }

  /* TEXT ARCHITECTURE */
  .eyebrow, .headline, .divider, .message, .btn-container, .hidden-content {
    position: relative;
    z-index: 10;
  }

  .eyebrow {
    font-size: clamp(0.72rem, 1.8vw, 0.85rem);
    font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--royal-blue); 
    text-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
    opacity: 0; transform: translateY(15px);
    transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    margin-bottom: clamp(1rem, 3vh, 1.5rem);
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.2rem, 11vw, 5.8rem);
    font-weight: 300; line-height: 1.05; 
    letter-spacing: -0.02em;
    color: var(--starlight);
    opacity: 0; transform: translateY(20px);
    transition: opacity 1.2s 0.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    margin-bottom: 0.2rem;
  }
  .headline em {
    font-style: italic; font-weight: 400;
    background: linear-gradient(90deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .divider {
    height: 1px; 
    margin: clamp(1.2rem, 3.5vh, 2.5rem) auto;
    width: 0; max-width: 240px;
    background: linear-gradient(90deg, transparent, rgba(139,92,246,0.5), rgba(59,130,246,0.5), transparent);
    transition: width 1.5s 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .divider.open { width: 240px; }

  .message {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 4.5vw, 2.2rem);
    font-weight: 300;
    line-height: 1.55;
    color: rgba(248, 250, 252, 0.85); 
    margin-bottom: 0px;
    letter-spacing: 0.01em;
    transition: margin 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .message.expanded {
    margin-bottom: clamp(1.8rem, 5vh, 3rem);
    color: var(--starlight); 
  }

  .char {
    display: inline-block;
    opacity: 0;
    transform: translateY(12px) scale(0.9);
    filter: blur(4px);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.5s ease;
  }
  .char.reveal-on {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }

  .hidden-content {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 1.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 1s ease;
  }
  .hidden-content.reveal {
    max-height: 400px;
    opacity: 1;
  }

  .wish {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 5.5vw, 3rem);
    font-weight: 400;
    background: linear-gradient(120deg, #f8fafc, #a78bfa, #60a5fa, #f8fafc);
    background-size: 300% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: celestialShimmer 6s linear infinite;
    margin-bottom: 0.5rem; line-height: 1.3;
  }
  @keyframes celestialShimmer { to { background-position: 300% center; } }

  .namesign {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 7vw, 3.6rem);
    font-style: italic; font-weight: 600;
    background: linear-gradient(90deg, #f8fafc, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: clamp(0.5rem, 2vh, 1rem);
    letter-spacing: 0.03em;
  }

  /* BUTTON CONTAINER BOUNDS */
  .btn-container {
    display: inline-flex;
    justify-content: center;
    margin-top: clamp(1.8rem, 5vh, 3.2rem);
    position: relative;
    width: 100%;
    max-width: 100%;
  }

  .action-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap; 
    gap: 6px 8px;   
    background: linear-gradient(135deg, #4f46e5, #7c3aed, #2563eb, #4f46e5);
    background-size: 300% 100%;
    color: #ffffff;
    border: none;
    padding: 16px 28px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border-radius: 50px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(25px);
    transition: opacity 0.8s ease, transform 0.8s ease, box-shadow 0.4s, background-position 0.4s;
    outline: none;
    width: auto;
    max-width: 100%; 
    -webkit-tap-highlight-color: transparent;
    animation: dynamicPulse 2s infinite ease-in-out, fluidGlow 4s linear infinite;
  }

  .action-btn .btn-text-segment {
    display: inline-block;
    line-height: 1.3;
    white-space: normal; 
  }

  @keyframes fluidGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes dynamicPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); box-shadow: 0 0 20px rgba(124, 58, 237, 0.3); }
    100% { transform: scale(1); }
  }

  /* ── INLINE TAP GUIDE HUB ── */
  .tap-guide-inline {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 32px;
    height: 24px;
    pointer-events: none;
    flex-shrink: 0; 
  }

  .tap-ripple-ring {
    position: absolute;
    top: 50%;
    left: 40%;
    width: 6px;
    height: 6px;
    background: transparent;
    border: 2px solid rgba(248, 250, 252, 0.85);
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(1);
    animation: targetPulse 1.6s infinite cubic-bezier(0.165, 0.84, 0.44, 1);
  }
  
  .ring-2 { animation-delay: 0.4s; }
  .ring-3 { animation-delay: 0.8s; }

  @keyframes targetPulse {
    0% { transform: translate(-50%, -50%) scale(0.6); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(5.5); opacity: 0; }
  }

  .pointer-hand-svg {
    position: absolute;
    top: 50%;
    left: 40%;
    width: 24px;
    height: 24px;
    fill: var(--starlight);
    filter: drop-shadow(-2px 4px 5px rgba(0,0,0,0.45));
    transform-origin: center center;
    animation: rightHandIndexTap 1.6s infinite cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  @keyframes rightHandIndexTap {
    0% { transform: translate(18%, 28%) rotate(-45deg) scale(1.05); }
    35% { transform: translate(-25%, -15%) rotate(-45deg) scale(0.82); filter: drop-shadow(-1px 2px 2px rgba(0,0,0,0.55)); }
    70% { transform: translate(18%, 28%) rotate(-45deg) scale(1.05); }
    100% { transform: translate(18%, 28%) rotate(-45deg) scale(1.05); }
  }

  .btn-ripple {
    position: absolute;
    inset: 0;
    border-radius: 50px;
    pointer-events: none;
    z-index: -1;
    opacity: 0;
    border: 2px solid rgba(139, 92, 246, 0.5);
    transform: scale(1);
  }
  
  .action-btn.show ~ .btn-ripple {
    animation: waveOut 2.5s infinite cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes waveOut {
    0% { transform: scale(0.95); opacity: 0; }
    15% { opacity: 0.7; }
    70% { opacity: 0; transform: scale(1.25, 1.4); }
    100% { opacity: 0; }
  }

  .action-btn .smiley {
    font-size: 1.1rem;
    display: inline-block;
    vertical-align: middle;
    transform-origin: center bottom;
    animation: wobble 1.5s infinite alternate ease-in-out;
    margin-left: 4px;
    line-height: 1;
  }

  @keyframes wobble {
    0% { transform: rotate(-5deg); }
    100% { transform: rotate(8deg) scale(1.1); }
  }

  .show { opacity: 1 !important; transform: none !important; }
  
  .hide-btn-container {
    opacity: 0 !important;
    transform: scale(0.5) !important;
    pointer-events: none !important;
    margin-top: 0px !important;
    height: 0px !important;
    overflow: hidden;
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @media (max-width: 480px) {
    .action-btn {
      padding: 14px 20px;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      gap: 4px 6px;
    }
    .tap-guide-inline { width: 28px; }
    .pointer-hand-svg { width: 20px; height: 20px; }
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="nebulaCanvas"></canvas>
<canvas id="interactiveCanvas"></canvas>

<div class="card-container" id="cardContainer">
  <div class="card">
    <p class="eyebrow" id="ey">a little note, just for You</p>
    <h1 class="headline" id="hl">Misoji<em></em></h1>
    <div class="divider" id="dv"></div>
    <p class="message" id="msg"></p>
    
    <div class="btn-container" id="btnContainer">
      <button class="action-btn" id="actBtn" onclick="unlockSmile(event)">
        <span class="btn-text-segment">click to unlock</span>
        
        <div class="tap-guide-inline">
          <div class="tap-ripple-ring ring-1"></div>
          <div class="tap-ripple-ring ring-2"></div>
          <div class="tap-ripple-ring ring-3"></div>
          
          <svg class="pointer-hand-svg" viewBox="0 0 32 32">
            <path d="M14,2 C12.35,2 11,3.35 11,5 L11,15.5 C10.3,15.15 9.45,15.1 8.7,15.45 L5.95,16.85 C5.15,17.25 4.75,18.15 5.05,18.95 L8.5,27.5 C9.45,29.85 11.75,31 14.15,31 L22,31 C24.75,31 27,28.75 27,26 L27,17 C27,15.35 25.65,14 24,14 C23.65,14 23.3,14.05 23,14.15 L23,12 C23,10.35 21.65,9 20,9 C19.5,9 19.05,9.1 18.6,10.3 C18.15,8.95 16.9,8 15.45,8 C14.95,8 14.45,8.1 14,8.3 L14,5 C14,3.35 12.65,2 11,2 Z M14,5 L14,14 L16,14 L16,11 C16,9.9 16.9,9 18,9 C19.1,9 20,9.9 20,11 L20,14 L22,14 L22,12 C22,10.9 22.9,10 24,10 C25.1,10 26,10.9 26,12 L26,16 L28,16 L28,15 C28,13.9 28.9,13 30,13 C31.1,13 32,13.9 32,15 L32,26 C32,29.3 29.3,32 26,32 L18.15,32 C15.15,32 12.3,30.55 11.15,27.65 L7.2,17.85 L8.55,17.15 C8.85,17 9.2,17 9.5,17.15 L12,18.4 L12,5 C12,3.9 12.9,3 14,3 C15.1,3 16,3.9 16,5 Z"/>
          </svg>
        </div>
        
        <span class="btn-text-segment">your smile <span class="smiley">😉👍</span></span>
      </button>
      <div class="btn-ripple"></div>
    </div>

    <div class="hidden-content" id="secretContent">
      <p class="wish" id="wsh">Well it looks just like —</p>
      <span class="namesign" id="nm">You.</span>
    </div>
  </div>
</div>

<script>
/* ── PARALLAX ENGINE ── */
let targetMouseX = 0, targetMouseY = 0;
let currentMouseX = 0, currentMouseY = 0;
const parallaxFactorCard = 0.025;
const parallaxFactorStars = 0.04;
const parallaxFactorNebula = 0.015;

window.addEventListener('mousemove', (e) => {
  targetMouseX = (e.clientX - window.innerWidth / 2);
  targetMouseY = (e.clientY - window.innerHeight / 2);
  trackActivity(e.clientX, e.clientY);
});

window.addEventListener('touchmove', (e) => {
  if(e.touches.length > 0) {
    targetMouseX = (e.touches[0].clientX - window.innerWidth / 2);
    targetMouseY = (e.touches[0].clientY - window.innerHeight / 2);
    trackActivity(e.touches[0].clientX, e.touches[0].clientY);
  }
}, { passive: true });

document.addEventListener('click', () => { initAudioEngine(); }, { once: false });
document.addEventListener('touchstart', () => { initAudioEngine(); }, { once: false });

function updateParallax() {
  currentMouseX += (targetMouseX - currentMouseX) * 0.08;
  currentMouseY += (targetMouseY - currentMouseY) * 0.08;
  const card = document.getElementById('cardContainer');
  if(card) {
    const rotX = -currentMouseY * parallaxFactorCard;
    const rotY = currentMouseX * parallaxFactorCard;
    card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(10px)`;
  }
  requestAnimationFrame(updateParallax);
}
updateParallax();

/* ── CONFIGURATION PARSER ── */
const urlParams = new URLSearchParams(window.location.search);
const customName = urlParams.get('name') || "Misoji";
const customHeadline = urlParams.get('headline') || "";
const customWish = urlParams.get('wish') || "Well it looks just like —";
const customSign = urlParams.get('sign') || "You.";
const customMessage = urlParams.get('message') || "Have you ever wondered how a beautiful moment looks like ?";

document.getElementById('hl').innerHTML = `${customName} <em>${customHeadline}</em>`;
document.getElementById('wsh').textContent = customWish;
document.getElementById('nm').textContent = customSign;

/* ── KINETIC CHARACTER INJECTION ── */
const msgEl = document.getElementById('msg');
const charElements = [];
customMessage.split("").forEach(char => {
  const span = document.createElement('span');
  span.className = 'char';
  span.innerHTML = char === " " ? "&nbsp;" : char; 
  msgEl.appendChild(span);
  charElements.push(span);
});

/* ── CANVAS DESIGN MAPS ── */
const bgC = document.getElementById('bgCanvas');
const bgX = bgC.getContext('2d');
const nbC = document.getElementById('nebulaCanvas');
const nbX = nbC.getContext('2d');
const intC = document.getElementById('interactiveCanvas');
const intX = intC.getContext('2d');

let mouse = { x: -1000, y: -1000, active: false, px: -1000, py: -1000, vx: 0, vy: 0 };

function resize() {
  bgC.width = nbC.width = intC.width = window.innerWidth;
  bgC.height = nbC.height = intC.height = window.innerHeight;
  drawNebulaBackground();
}
resize();
window.addEventListener('resize', resize);

function drawNebulaBackground() {
  nbX.clearRect(0, 0, nbC.width, nbC.height);
  const blobs = [
    { x:0.2, y:0.3,  r:0.5, c:'rgba(99,102,241,0.08)' },
    { x:0.7, y:0.7,  r:0.6, c:'rgba(139,92,246,0.06)' }
  ];
  blobs.forEach(b => {
    const grd = nbX.createRadialGradient(
      b.x * nbC.width, b.y * nbC.height, 0,
      b.x * nbC.width, b.y * nbC.height, b.r * Math.max(nbC.width, nbC.height)
    );
    grd.addColorStop(0, b.c);
    grd.addColorStop(1, 'transparent');
    nbX.fillStyle = grd;
    nbX.fillRect(0, 0, nbC.width, nbC.height);
  });
}

const starColors = ['rgba(248,250,252,', 'rgba(167,139,250,', 'rgba(96,165,250,'];
const stars = Array.from({length: 65}, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  size: Math.random() * 1.5 + 0.5,
  baseAlpha: Math.random() * 0.5 + 0.3,
  speedY: -(Math.random() * 0.2 + 0.05),
  speedX: (Math.random() - 0.5) * 0.1,
  color: starColors[Math.floor(Math.random() * starColors.length)]
}));

function drawStars() {
  bgX.clearRect(0, 0, bgC.width, bgC.height);
  const shiftX = currentMouseX * parallaxFactorStars;
  const shiftY = currentMouseY * parallaxFactorStars;

  stars.forEach(s => {
    s.y += s.speedY; s.x += s.speedX;
    if (s.y < -10) s.y = bgC.height + 10;
    if (s.x < -10) s.x = bgC.width + 10;
    if (s.x > bgC.width + 10) s.x = -10;

    const twinkle = Math.sin(Date.now() * 0.002 + s.x) * 0.2;
    const finalAlpha = Math.max(0.1, Math.min(1, s.baseAlpha + twinkle));

    bgX.beginPath();
    bgX.arc(s.x + shiftX, s.y + shiftY, s.size, 0, Math.PI * 2);
    bgX.fillStyle = s.color + finalAlpha + ')';
    bgX.fill();
  });
}

let trailParticles = [];
const interactiveGradients = ['rgba(167,139,250,', 'rgba(96,165,250,', 'rgba(248,250,252,'];
const interactiveShapes = ['✦', '✧', '·'];

function trackActivity(nx, ny) {
  if (mouse.px !== -1000) {
    mouse.vx = nx - mouse.px;
    mouse.vy = ny - mouse.py;
  }
  mouse.px = mouse.x = nx; mouse.py = mouse.y = ny; mouse.active = true;

  const velocity = Math.sqrt(mouse.vx * mouse.vx + mouse.vy * mouse.vy);
  if (velocity > 2) {
    trailParticles.push({
      x: nx, y: ny, size: Math.random() * 8 + 8,
      vx: (Math.random() - 0.5) * 1 + mouse.vx * 0.05,
      vy: (Math.random() - 0.5) * 1 - 0.3,
      shape: interactiveShapes[Math.floor(Math.random() * interactiveShapes.length)],
      color: interactiveGradients[Math.floor(Math.random() * interactiveGradients.length)],
      alpha: 0.8, rotation: Math.random() * Math.PI * 2, rotationSpeed: (Math.random() - 0.5) * 0.05
    });
  }
}

/* ── CINEMATIC AUDIO ENGINE ── */
let audioCtx = null;
let ambientDroneOsc = null;
let ambientDroneGain = null;
let isGenerativePlaying = false;
let isAudioActive = true; 

function initAudioEngine() {
  if (!isAudioActive) return; 
  if (audioCtx) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();
    startAmbientDrone();
  } catch(e) { console.log('Audio Context blocked.'); }
}

function startAmbientDrone() {
  if (ambientDroneOsc || !isAudioActive) return;
  
  ambientDroneGain = audioCtx.createGain();
  ambientDroneGain.gain.setValueAtTime(0, audioCtx.currentTime);
  ambientDroneGain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 2.5);
  ambientDroneGain.connect(audioCtx.destination);

  ambientDroneOsc = audioCtx.createOscillator();
  ambientDroneOsc.type = 'triangle';
  ambientDroneOsc.frequency.setValueAtTime(87.31, audioCtx.currentTime);
  ambientDroneOsc.connect(ambientDroneGain);
  ambientDroneOsc.start();
}

function triggerCinematicClimax() {
  if (!isAudioActive) return;
  if (!audioCtx) initAudioEngine();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const time = audioCtx.currentTime;
  
  if (ambientDroneGain) {
    ambientDroneGain.gain.cancelScheduledValues(time);
    ambientDroneGain.gain.setValueAtTime(ambientDroneGain.gain.value, time);
    ambientDroneGain.gain.linearRampToValueAtTime(0.12, time + 0.1);
    ambientDroneGain.gain.exponentialRampToValueAtTime(0.0001, time + 4.0); // Smooth drone fade within 4 seconds
  }

  const romanticScale = [174.61, 220.00, 261.63, 329.63, 392.00, 440.00];
  
  romanticScale.forEach((freq, idx) => {
    const noteDelay = idx * 0.08; 
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc.type = 'sine'; 
    osc.frequency.setValueAtTime(freq, time + noteDelay);
    osc.frequency.linearRampToValueAtTime(freq * 0.998, time + noteDelay + 0.5);

    gainNode.gain.setValueAtTime(0, time + noteDelay);
    gainNode.gain.linearRampToValueAtTime(0.14, time + noteDelay + 0.05); 
    gainNode.gain.exponentialRampToValueAtTime(0.0001, time + noteDelay + 3.2); // Tail components decay beautifully by 3.2s

    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    osc.start(time + noteDelay);
    osc.stop(time + noteDelay + 3.5);
  });
}

function startStarTwinkleGenerator() {
  // Disabled generator pattern to ensure complete silence after the click sequence
  return;
}

/* ── UNLOCK INTERACTION ── */
function unlockSmile(e) {
  e.preventDefault();
  triggerCinematicClimax();

  // Flag to immediately reject any further touch/click attempts to start audio
  isGenerativePlaying = false; 

  // Master fade block: shut down audio context entirely after 4.5 seconds
  setTimeout(() => {
    isAudioActive = false;
    if (audioCtx && audioCtx.state !== 'closed') {
      audioCtx.close().catch(err => console.log(err));
    }
  }, 4500);

  const container = document.getElementById('btnContainer');
  const msg = document.getElementById('msg');
  const secret = document.getElementById('secretContent');
  
  container.classList.add('hide-btn-container');
  msg.classList.add('expanded');
  
  const rect = document.getElementById('actBtn').getBoundingClientRect();
  const startX = rect.left + rect.width / 2;
  const startY = rect.top + rect.height / 2;

  for (let i = 0; i < 45; i++) {
    const angle = (Math.PI * 2 / 45) * i + (Math.random() - 0.5) * 0.2;
    const speed = Math.random() * 5.0 + 4.0;
    trailParticles.push({
      x: startX, y: startY, size: Math.random() * 10 + 10,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 0.5,
      shape: interactiveShapes[Math.floor(Math.random() * interactiveShapes.length)],
      color: interactiveGradients[Math.floor(Math.random() * interactiveGradients.length)],
      alpha: 1.0, rotation: Math.random() * Math.PI * 2, rotationSpeed: (Math.random() - 0.5) * 0.2
    });
  }

  setTimeout(() => { secret.classList.add('reveal'); }, 400);
}

function drawInteractiveTrail() {
  intX.clearRect(0, 0, intC.width, intC.height);
  for (let i = trailParticles.length - 1; i >= 0; i--) {
    let p = trailParticles[i];
    p.x += p.vx; p.y += p.vy; p.alpha -= 0.015; p.rotation += p.rotationSpeed;
    if (p.alpha <= 0) { trailParticles.splice(i, 1); continue; }
    
    intX.save(); intX.translate(p.x, p.y); intX.rotate(p.rotation);
    intX.font = `${p.size}px serif`; intX.fillStyle = p.color + p.alpha + ')';
    intX.textAlign = 'center'; intX.textBaseline = 'middle';
    intX.fillText(p.shape, 0, 0); intX.restore();
  }
}

(function animationCore() {
  drawStars(); drawInteractiveTrail();
  requestAnimationFrame(animationCore);
})();
